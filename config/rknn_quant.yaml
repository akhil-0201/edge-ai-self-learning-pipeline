# ============================================================
#  RKNN Quantization Configuration
# ============================================================

conversion:
  onnx_opset:             12
  input_shape:            [1, 3, 640, 640]
  input_name:             "images"
  output_names:           ["output0"]
  quantization_type:      "i8"           # INT8
  quantization_algorithm: "normal"        # normal | mmse
  calibration_samples:    100
  mixed_precision_fallback: true          # try FP16 if INT8 fails delta check
  target_platform:        "rk3588"
  mean_values:            [[0, 0, 0]]
  std_values:             [[255, 255, 255]]

benchmark:
  warmup_frames:          10
  benchmark_frames:       100
  latency_p95_threshold_ms: 100
  latency_p99_threshold_ms: 200

paths:
  onnx_export_dir:        /data/models/exports
  rknn_export_dir:        /data/models
  calibration_dataset:    /data/reference/calibration
